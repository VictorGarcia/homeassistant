# Home dashboard — main view
#
# Stored on the Pi at /config/.storage/lovelace.dashboard_home (JSON).
# This YAML is the readable source of truth in git. The `scripts/apply-dashboard.sh`
# script converts and writes the JSON.
#
# Requires (all installed via HACS):
#   - piitaya/lovelace-mushroom (plugin)    — Mushroom cards (custom:mushroom-*)
#   - basnijholt/adaptive-lighting          — for AL switches referenced below

views:
  - type: sections
    title: Home
    path: home
    icon: mdi:home
    max_columns: 4
    dense_section_placement: true
    sections:

      # =========================================================
      # STATUS — at-a-glance row: weather, person, sun, alerts
      # =========================================================
      - type: grid
        cards:
          - type: heading
            heading: Status
            icon: mdi:home-variant
            heading_style: title

          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: weather
                entity: weather.forecast_home
                show_conditions: true
                show_temperature: true
              - type: entity
                entity: person.victor
                content_info: state
                icon_color: blue
              - type: entity
                entity: sun.sun
                content_info: none
              - type: conditional
                conditions:
                  - condition: state
                    entity: update.home_assistant_core_update
                    state: "on"
                chip:
                  type: template
                  icon: mdi:update
                  content: HA update
                  icon_color: orange
                  tap_action:
                    action: navigate
                    navigation_path: /config/updates
              - type: conditional
                conditions:
                  - condition: numeric_state
                    entity: sensor.outdoor_battery
                    below: 30
                chip:
                  type: entity
                  entity: sensor.outdoor_battery
                  icon_color: red
                  content_info: state
              - type: conditional
                conditions:
                  - condition: numeric_state
                    entity: sensor.living_room_battery
                    below: 30
                chip:
                  type: entity
                  entity: sensor.living_room_battery
                  icon_color: red
              - type: conditional
                conditions:
                  - condition: numeric_state
                    entity: sensor.master_bedroom_battery
                    below: 30
                chip:
                  type: entity
                  entity: sensor.master_bedroom_battery
                  icon_color: red

          - type: weather-forecast
            entity: weather.forecast_home
            forecast_type: daily
            show_forecast: true
            show_current: false

      # =========================================================
      # QUICK ACTIONS — scene-like macros
      # =========================================================
      - type: grid
        cards:
          - type: heading
            heading: Quick actions
            icon: mdi:gesture-tap
            heading_style: title

          - type: custom:mushroom-template-card
            primary: Good Morning
            secondary: AL on, sleep off
            icon: mdi:weather-sunny
            icon_color: amber
            tap_action:
              action: perform-action
              perform_action: switch.turn_on
              target:
                entity_id:
                  - switch.adaptive_lighting_kitchen
                  - switch.adaptive_lighting_pasillo
                  - switch.adaptive_lighting_office
            hold_action:
              action: perform-action
              perform_action: switch.turn_off
              target:
                entity_id:
                  - switch.adaptive_lighting_sleep_mode_kitchen
                  - switch.adaptive_lighting_sleep_mode_pasillo
                  - switch.adaptive_lighting_sleep_mode_office

          - type: custom:mushroom-template-card
            primary: Movie Mode
            secondary: Dim lights
            icon: mdi:movie-open
            icon_color: purple
            tap_action:
              action: perform-action
              perform_action: light.turn_on
              data:
                brightness_pct: 20
                transition: 3
              target:
                entity_id:
                  - light.kitchen_light
                  - light.pasillo
                  - light.office_light_local
                  - light.lightstrip

          - type: custom:mushroom-template-card
            primary: Bedtime
            secondary: Sleep mode on
            icon: mdi:bed
            icon_color: indigo
            tap_action:
              action: perform-action
              perform_action: switch.turn_on
              target:
                entity_id:
                  - switch.adaptive_lighting_sleep_mode_kitchen
                  - switch.adaptive_lighting_sleep_mode_pasillo
                  - switch.adaptive_lighting_sleep_mode_office

          - type: custom:mushroom-template-card
            primary: All Off
            secondary: Every light
            icon: mdi:lightbulb-off-outline
            icon_color: grey
            tap_action:
              action: perform-action
              perform_action: light.turn_off
              target:
                entity_id:
                  - light.kitchen_light
                  - light.pasillo
                  - light.office_light_local
                  - light.lightstrip
                  - light.living_light_1
                  - light.living_light_2
                  - light.living_light_3

      # =========================================================
      # LIVING ROOM
      # =========================================================
      - type: grid
        cards:
          - type: heading
            heading: Living Room
            icon: mdi:sofa
            heading_style: title

          - type: custom:mushroom-light-card
            entity: light.living_light_1
            name: Bulb 1
            show_brightness_control: true
            collapsible_controls: true
            layout: vertical

          - type: custom:mushroom-light-card
            entity: light.living_light_2
            name: Bulb 2
            show_brightness_control: true
            collapsible_controls: true
            layout: vertical

          - type: custom:mushroom-light-card
            entity: light.living_light_3
            name: Bulb 3
            show_brightness_control: true
            collapsible_controls: true
            layout: vertical

          - type: conditional
            conditions:
              - condition: state
                entity: light.living_light_1
                state: unavailable
            card:
              type: custom:mushroom-template-card
              primary: Wall switch is off
              secondary: Flip the physical switch to power the bulbs
              icon: mdi:toggle-switch-off-outline
              icon_color: grey
              fill_container: false

          - type: custom:mushroom-entity-card
            entity: sensor.living_room_temperature
            name: Temperature
            icon_color: >
              {% set t = states('sensor.living_room_temperature') | float(0) %}
              {% if t < 18 %}blue
              {% elif t < 24 %}green
              {% else %}orange
              {% endif %}

          - type: custom:mushroom-entity-card
            entity: sensor.living_room_humidity
            name: Humidity
            icon_color: >
              {% set h = states('sensor.living_room_humidity') | float(0) %}
              {% if h < 40 %}orange
              {% elif h < 60 %}green
              {% else %}blue
              {% endif %}

          - type: history-graph
            entities:
              - entity: sensor.living_room_temperature
                name: Temp
              - entity: sensor.living_room_humidity
                name: Humidity
            hours_to_show: 24

      # =========================================================
      # KITCHEN
      # =========================================================
      - type: grid
        cards:
          - type: heading
            heading: Kitchen
            icon: mdi:silverware-fork-knife
            heading_style: title

          - type: custom:mushroom-light-card
            entity: light.kitchen_light
            name: Ceiling
            show_brightness_control: true
            show_color_temp_control: true
            collapsible_controls: true

          - type: custom:mushroom-light-card
            entity: light.lightstrip
            name: Lightstrip
            show_brightness_control: true
            show_color_control: true
            collapsible_controls: true

          - type: custom:mushroom-title-card
            subtitle: Adaptive Lighting

          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: switch.adaptive_lighting_kitchen
                content_info: name
                icon_color: amber
              - type: entity
                entity: switch.adaptive_lighting_adapt_color_kitchen
                content_info: name
              - type: entity
                entity: switch.adaptive_lighting_adapt_brightness_kitchen
                content_info: name
              - type: entity
                entity: switch.adaptive_lighting_sleep_mode_kitchen
                content_info: name
                icon_color: indigo

      # =========================================================
      # OFFICE
      # =========================================================
      - type: grid
        cards:
          - type: heading
            heading: Office
            icon: mdi:desk
            heading_style: title

          - type: custom:mushroom-light-card
            entity: light.office_light_local
            name: Desk light
            show_brightness_control: true
            show_color_temp_control: true
            collapsible_controls: true

          - type: custom:mushroom-title-card
            subtitle: Adaptive Lighting

          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: switch.adaptive_lighting_office
                content_info: name
                icon_color: amber
              - type: entity
                entity: switch.adaptive_lighting_adapt_color_office
                content_info: name
              - type: entity
                entity: switch.adaptive_lighting_adapt_brightness_office
                content_info: name
              - type: entity
                entity: switch.adaptive_lighting_sleep_mode_office
                content_info: name
                icon_color: indigo

      # =========================================================
      # PASILLO
      # =========================================================
      - type: grid
        cards:
          - type: heading
            heading: Pasillo
            icon: mdi:door-sliding
            heading_style: title

          - type: custom:mushroom-light-card
            entity: light.pasillo
            name: Hallway
            show_brightness_control: true
            show_color_temp_control: true
            collapsible_controls: true

          - type: custom:mushroom-title-card
            subtitle: Adaptive Lighting

          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: switch.adaptive_lighting_pasillo
                content_info: name
                icon_color: amber
              - type: entity
                entity: switch.adaptive_lighting_adapt_color_pasillo
                content_info: name
              - type: entity
                entity: switch.adaptive_lighting_adapt_brightness_pasillo
                content_info: name
              - type: entity
                entity: switch.adaptive_lighting_sleep_mode_pasillo
                content_info: name
                icon_color: indigo

      # =========================================================
      # BEDROOM
      # =========================================================
      - type: grid
        cards:
          - type: heading
            heading: Bedroom
            icon: mdi:bed
            heading_style: title

          - type: custom:mushroom-entity-card
            entity: sensor.master_bedroom_temperature
            name: Temperature
            icon_color: >
              {% set t = states('sensor.master_bedroom_temperature') | float(0) %}
              {% if t < 18 %}blue
              {% elif t < 24 %}green
              {% else %}orange
              {% endif %}

          - type: custom:mushroom-entity-card
            entity: sensor.master_bedroom_humidity
            name: Humidity
            icon_color: >
              {% set h = states('sensor.master_bedroom_humidity') | float(0) %}
              {% if h < 40 %}orange
              {% elif h < 60 %}green
              {% else %}blue
              {% endif %}

          - type: history-graph
            entities:
              - entity: sensor.master_bedroom_temperature
                name: Temp
              - entity: sensor.master_bedroom_humidity
                name: Humidity
            hours_to_show: 24

      # =========================================================
      # OUTDOOR & ENTRY
      # =========================================================
      - type: grid
        cards:
          - type: heading
            heading: Outdoor & Entry
            icon: mdi:tree
            heading_style: title

          - type: custom:mushroom-entity-card
            entity: sensor.outdoor_temperature
            name: Outdoor temp
            icon_color: >
              {% set t = states('sensor.outdoor_temperature') | float(0) %}
              {% if t < 5 %}blue
              {% elif t < 20 %}green
              {% else %}orange
              {% endif %}

          - type: custom:mushroom-entity-card
            entity: sensor.outdoor_humidity
            name: Outdoor humidity

          - type: custom:mushroom-entity-card
            entity: binary_sensor.door_opening
            name: Front door
            icon_color: >
              {% if is_state('binary_sensor.door_opening','on') %}red{% else %}grey{% endif %}

          - type: history-graph
            entities:
              - entity: sensor.outdoor_temperature
                name: Outdoor temp
              - entity: sensor.outdoor_humidity
                name: Outdoor humidity
            hours_to_show: 24

      # =========================================================
      # SYSTEM — less prominent, at the bottom
      # =========================================================
      - type: grid
        cards:
          - type: heading
            heading: System
            icon: mdi:cog-outline
            heading_style: subtitle

          - type: custom:mushroom-entity-card
            entity: sensor.backup_next_scheduled_automatic_backup
            name: Next backup
            icon: mdi:backup-restore
            icon_color: blue

          - type: custom:mushroom-entity-card
            entity: sensor.backup_last_successful_automatic_backup
            name: Last backup
            icon: mdi:check-circle-outline
            icon_color: green

          - type: custom:mushroom-entity-card
            entity: binary_sensor.rpi_power_status
            name: Pi power
            icon: mdi:raspberry-pi
            icon_color: >
              {% if is_state('binary_sensor.rpi_power_status','on') %}red{% else %}green{% endif %}

          - type: custom:mushroom-entity-card
            entity: sensor.iphone_15_pro_battery_level
            name: iPhone battery
            icon: mdi:cellphone
            icon_color: >
              {% set b = states('sensor.iphone_15_pro_battery_level') | float(0) %}
              {% if b < 20 %}red
              {% elif b < 50 %}orange
              {% else %}green
              {% endif %}

          - type: entities
            title: Sensor batteries
            show_header_toggle: false
            entities:
              - entity: sensor.outdoor_battery
                name: Outdoor
              - entity: sensor.living_room_battery
                name: Living Room
              - entity: sensor.master_bedroom_battery
                name: Bedroom
              - entity: sensor.door_battery
                name: Door

          - type: entities
            title: Updates
            show_header_toggle: false
            entities:
              - update.home_assistant_core_update
              - update.home_assistant_supervisor_update
              - update.advanced_ssh_web_terminal_update
              - update.cloudflared_update
              - update.hacs_update
              - update.local_tuya_update
