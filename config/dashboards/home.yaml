# Home dashboard — primary, day-to-day view
#
# Stored on the Pi at /config/.storage/lovelace.dashboard_home.
# Apply with: ./scripts/apply-dashboard.sh home
#
# Requires (HACS):
#   - piitaya/lovelace-mushroom (plugin) — Mushroom cards (custom:mushroom-*)
#   - basnijholt/adaptive-lighting (integration) — AL switches

views:
  - type: sections
    title: Home
    path: home
    icon: mdi:home
    max_columns: 4
    dense_section_placement: true
    sections:

      # ── Status (quarter-width) — chips only, kept short ──
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: Status
            icon: mdi:home-variant
            heading_style: title

          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: weather
                entity: weather.forecast_home
                show_conditions: true
                show_temperature: true
              - type: entity
                entity: person.victor
                content_info: state
                icon_color: blue
              - type: entity
                entity: sun.sun
                content_info: none
              - type: conditional
                conditions:
                  - condition: state
                    entity: update.home_assistant_core_update
                    state: "on"
                chip:
                  type: template
                  icon: mdi:update
                  content: HA update
                  icon_color: orange
                  tap_action:
                    action: navigate
                    navigation_path: /config/updates
              - type: conditional
                conditions:
                  - condition: numeric_state
                    entity: sensor.outdoor_battery
                    below: 30
                chip:
                  type: entity
                  entity: sensor.outdoor_battery
                  icon_color: red
                  content_info: state
              - type: conditional
                conditions:
                  - condition: numeric_state
                    entity: sensor.living_room_battery
                    below: 30
                chip:
                  type: entity
                  entity: sensor.living_room_battery
                  icon_color: red
              - type: conditional
                conditions:
                  - condition: numeric_state
                    entity: sensor.master_bedroom_battery
                    below: 30
                chip:
                  type: entity
                  entity: sensor.master_bedroom_battery
                  icon_color: red

      # ── Quick actions (half-width, 4 buttons in 2×2) ──
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Quick actions
            icon: mdi:gesture-tap
            heading_style: title

          - type: custom:mushroom-template-card
            primary: Good Morning
            secondary: AL on, sleep off
            icon: mdi:weather-sunny
            icon_color: amber
            grid_options: { columns: 6 }
            tap_action:
              action: perform-action
              perform_action: switch.turn_on
              target:
                entity_id:
                  - switch.adaptive_lighting_kitchen
                  - switch.adaptive_lighting_pasillo
                  - switch.adaptive_lighting_office
            hold_action:
              action: perform-action
              perform_action: switch.turn_off
              target:
                entity_id:
                  - switch.adaptive_lighting_sleep_mode_kitchen
                  - switch.adaptive_lighting_sleep_mode_pasillo
                  - switch.adaptive_lighting_sleep_mode_office

          - type: custom:mushroom-template-card
            primary: Movie Mode
            secondary: Dim lights
            icon: mdi:movie-open
            icon_color: purple
            grid_options: { columns: 6 }
            tap_action:
              action: perform-action
              perform_action: light.turn_on
              data:
                brightness_pct: 20
                transition: 3
              target:
                entity_id:
                  - light.kitchen_light
                  - light.pasillo
                  - light.office_light_local
                  - light.lightstrip

          - type: custom:mushroom-template-card
            primary: Bedtime
            secondary: Sleep mode on
            icon: mdi:bed
            icon_color: indigo
            grid_options: { columns: 6 }
            tap_action:
              action: perform-action
              perform_action: switch.turn_on
              target:
                entity_id:
                  - switch.adaptive_lighting_sleep_mode_kitchen
                  - switch.adaptive_lighting_sleep_mode_pasillo
                  - switch.adaptive_lighting_sleep_mode_office

          - type: custom:mushroom-template-card
            primary: All Off
            secondary: Every light
            icon: mdi:lightbulb-off-outline
            icon_color: grey
            grid_options: { columns: 6 }
            tap_action:
              action: perform-action
              perform_action: homeassistant.turn_off
              target:
                entity_id:
                  - light.kitchen_light
                  - light.pasillo
                  - light.office_light_local
                  - light.lightstrip
                  - light.living_room
                  - switch.sonoff_salon_comedor_switch
                  - switch.sonoff_eric_bedroom

      # ── Forecast (quarter-width, next to Quick actions) ──
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: Forecast
            icon: mdi:weather-partly-cloudy
            heading_style: title
          - type: weather-forecast
            entity: weather.forecast_home
            forecast_type: daily
            show_forecast: true
            show_current: false

      # ── Living Room (half-width) ──
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Living Room
            icon: mdi:sofa
            heading_style: title

          - type: custom:mushroom-light-card
            entity: light.living_room
            name: IKEA bulbs (×3)
            show_brightness_control: true
            collapsible_controls: true

          - type: conditional
            conditions:
              - condition: state
                entity: light.living_room
                state: unavailable
            card:
              type: custom:mushroom-template-card
              primary: Wall switch is off
              secondary: Flip the wall switch to power the bulbs
              icon: mdi:toggle-switch-off-outline
              icon_color: grey

          - type: sensor
            entity: sensor.living_room_temperature
            graph: line
            detail: 1
            name: Temperature
          - type: sensor
            entity: sensor.living_room_humidity
            graph: line
            detail: 1
            name: Humidity

      # ── Kitchen (half-width) ──
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Kitchen
            icon: mdi:silverware-fork-knife
            heading_style: title

          - type: custom:mushroom-light-card
            entity: light.kitchen_light
            name: Ceiling
            show_brightness_control: true
            show_color_temp_control: true
            collapsible_controls: true

          - type: custom:mushroom-light-card
            entity: light.lightstrip
            name: Lightstrip
            show_brightness_control: true
            show_color_control: true
            collapsible_controls: true

          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: switch.adaptive_lighting_kitchen
                content_info: name
                icon_color: amber
              - type: entity
                entity: switch.adaptive_lighting_adapt_color_kitchen
                content_info: none
              - type: entity
                entity: switch.adaptive_lighting_adapt_brightness_kitchen
                content_info: none
              - type: entity
                entity: switch.adaptive_lighting_sleep_mode_kitchen
                content_info: none
                icon_color: indigo

      # ── Office (half-width) ──
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Office
            icon: mdi:desk
            heading_style: title

          - type: custom:mushroom-light-card
            entity: light.office_light_local
            name: Desk light
            show_brightness_control: true
            show_color_temp_control: true
            collapsible_controls: true

          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: switch.adaptive_lighting_office
                content_info: name
                icon_color: amber
              - type: entity
                entity: switch.adaptive_lighting_adapt_color_office
                content_info: none
              - type: entity
                entity: switch.adaptive_lighting_adapt_brightness_office
                content_info: none
              - type: entity
                entity: switch.adaptive_lighting_sleep_mode_office
                content_info: none
                icon_color: indigo

      # ── Pasillo (half-width) ──
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Pasillo
            icon: mdi:door-sliding
            heading_style: title

          - type: custom:mushroom-light-card
            entity: light.pasillo
            name: Hallway
            show_brightness_control: true
            show_color_temp_control: true
            collapsible_controls: true

          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: switch.adaptive_lighting_pasillo
                content_info: name
                icon_color: amber
              - type: entity
                entity: switch.adaptive_lighting_adapt_color_pasillo
                content_info: none
              - type: entity
                entity: switch.adaptive_lighting_adapt_brightness_pasillo
                content_info: none
              - type: entity
                entity: switch.adaptive_lighting_sleep_mode_pasillo
                content_info: none
                icon_color: indigo

      # ── Master Bedroom (half-width) ──
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Master Bedroom
            icon: mdi:bed
            heading_style: title
          - type: sensor
            entity: sensor.master_bedroom_temperature
            graph: line
            detail: 1
            name: Temperature
          - type: sensor
            entity: sensor.master_bedroom_humidity
            graph: line
            detail: 1
            name: Humidity

      # ── Eric's Bedroom (half-width) ──
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Eric's Bedroom
            icon: mdi:bed-outline
            heading_style: title
          - type: custom:mushroom-entity-card
            entity: switch.sonoff_eric_bedroom
            name: Bedroom light
            icon: mdi:ceiling-light
            icon_color: >
              {% if is_state('switch.sonoff_eric_bedroom','on') %}amber{% else %}grey{% endif %}
            tap_action:
              action: toggle

      # ── Claudia's Bedroom (half-width) ──
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Claudia's Bedroom
            icon: mdi:bed-outline
            heading_style: title
          - type: custom:mushroom-cover-card
            entity: cover.persiana_claudia
            name: Persiana
            icon: mdi:blinds-horizontal
            show_buttons_control: true
            show_position_control: true
            collapsible_controls: true
          - type: conditional
            conditions:
              - condition: state
                entity: sensor.persiana_claudia_calibrated
                state: not_calibrated
            card:
              type: custom:mushroom-template-card
              primary: Persiana not calibrated
              secondary: Press the Configure button to re-run calibration
              icon: mdi:alert
              icon_color: orange
              tap_action:
                action: perform-action
                perform_action: button.press
                target:
                  entity_id: button.persiana_claudia_configure_cover_limits

      # ── Dining Room (half-width) ──
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Dining Room
            icon: mdi:silverware-variant
            heading_style: title
          - type: custom:mushroom-entity-card
            entity: switch.sonoff_salon_comedor_switch
            name: Comedor
            icon: mdi:ceiling-light
            icon_color: >
              {% if is_state('switch.sonoff_salon_comedor_switch','on') %}amber{% else %}grey{% endif %}
            tap_action:
              action: toggle

      # ── Outdoor & Entry (half-width) ──
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Outdoor & Entry
            icon: mdi:tree
            heading_style: title
          - type: sensor
            entity: sensor.outdoor_temperature
            graph: line
            detail: 1
            name: Outdoor temp
          - type: sensor
            entity: sensor.outdoor_humidity
            graph: line
            detail: 1
            name: Outdoor humidity
          - type: custom:mushroom-entity-card
            entity: binary_sensor.door_opening
            name: Front door
            icon_color: >
              {% if is_state('binary_sensor.door_opening','on') %}red{% else %}grey{% endif %}
