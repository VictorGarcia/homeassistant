- id: '1776348000000'
  alias: Front door alerts (away)
  description: Push notification to iPhone when the front door opens or closes while
    Victor is not at home. Escalates to critical if the door stays open for 3+ minutes.
    Successive events on the same away-session replace the banner via the 'door-event'
    tag.
  triggers:
  - trigger: state
    entity_id: binary_sensor.door_opening
    from: 'off'
    to: 'on'
    id: opened
  - trigger: state
    entity_id: binary_sensor.door_opening
    from: 'on'
    to: 'off'
    id: closed
  - trigger: state
    entity_id: binary_sensor.door_opening
    to: 'on'
    for: 00:03:00
    id: held_open
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: person.victor
      state: home
  actions:
  - choose:
    - conditions: '{{ trigger.id == ''opened'' }}'
      sequence:
      - action: notify.mobile_app_iphone_15_pro
        data:
          title: "\U0001F6AA Front door opened"
          message: Door opened at {{ now().strftime('%H:%M') }} while you're away
          data:
            push:
              interruption-level: time-sensitive
              sound: default
            tag: door-event
            url: /dashboard-home/home
    - conditions: '{{ trigger.id == ''closed'' }}'
      sequence:
      - action: notify.mobile_app_iphone_15_pro
        data:
          title: "\U0001F512 Front door closed"
          message: Door closed at {{ now().strftime('%H:%M') }}
          data:
            push:
              interruption-level: active
            tag: door-event
            url: /dashboard-home/home
    - conditions: '{{ trigger.id == ''held_open'' }}'
      sequence:
      - action: notify.mobile_app_iphone_15_pro
        data:
          title: ⚠️ Front door still open
          message: Door has been open for 3 minutes and you're away
          data:
            push:
              interruption-level: critical
              sound:
                name: default
                critical: 1
                volume: 1.0
            tag: door-event-critical
            url: /dashboard-home/home
  mode: queued
  max: 10
- id: '1776560000000'
  alias: Living Room wall switch toggles lights
  description: Wall switch is decoupled from the ZBMINI relay (channel 2 of the SONOFF
    MINI-ZB2GS, detach_relay = 'CH2 enabled'). Each flip of the wall switch changes
    binary_sensor.sonoff_salon_comedor_opening_2; we react by toggling light.living_room.
    IKEA bulbs stay always-powered so Adaptive Lighting / HA retain full control.
  triggers:
  - trigger: state
    entity_id: binary_sensor.sonoff_salon_comedor_opening_2
  conditions: []
  actions:
  - action: light.toggle
    target:
      entity_id: light.living_room
  mode: single
- id: '1776700000000'
  alias: Force lights off after HA start (away)
  description: When HA boots (power restore, manual restart), wait for device_tracker
    to resolve, and if person.victor isn't at home, turn off every light + both coupled-mode
    switches. Covers Tuya / Yeelight whose firmware wakes 'on' after power loss. Also
    notifies the iPhone so user knows.
  triggers:
  - trigger: homeassistant
    event: start
  conditions: []
  actions:
  - wait_template: '{{ states(''person.victor'') not in [''unknown'', ''unavailable'']
      }}'
    timeout: 00:05:00
    continue_on_timeout: true
  - condition: not
    conditions:
    - condition: state
      entity_id: person.victor
      state: home
  - delay: 00:00:30
  - action: homeassistant.turn_off
    target:
      entity_id:
      - light.kitchen_light
      - light.pasillo
      - light.office_light_local
      - light.lightstrip
      - light.living_room
      - switch.sonoff_salon_comedor_switch
      - switch.sonoff_eric_bedroom
  - action: notify.mobile_app_iphone_15_pro
    data:
      title: "\U0001F4A1 Power restored — lights off"
      message: HA rebooted at {{ now().strftime('%H:%M') }} while you were away. All
        lights turned off as a precaution.
      data:
        push:
          interruption-level: active
        tag: power-restore
        url: /dashboard-home/home
  mode: single
